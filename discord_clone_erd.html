
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2C2C2A' : '#F1EFE8',
    primaryBorderColor: dark ? '#5F5E5A' : '#B4B2A9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    edgeLabelBackground: dark ? '#2C2C2A' : '#F1EFE8',
  },
});
const diagram = `erDiagram
  users {
    bigint id PK
    string name
    string email
    string password
    timestamp created_at
  }
  profiles {
    uuid id PK
    bigint user_id FK
    string name
    text image_url
    string email
    timestamp created_at
  }
  servers {
    uuid id PK
    uuid profile_id FK
    string name
    text image_url
    string invite_code
    timestamp created_at
  }
  members {
    uuid id PK
    uuid profile_id FK
    uuid server_id FK
    enum role
    timestamp created_at
  }
  channels {
    uuid id PK
    uuid profile_id FK
    uuid server_id FK
    string name
    enum type
    timestamp created_at
  }
  messages {
    uuid id PK
    uuid member_id FK
    uuid channel_id FK
    text content
    text file_url
    boolean deleted
    timestamp created_at
    timestamp updated_at
  }
  conversations {
    uuid id PK
    uuid member_one_id FK
    uuid member_two_id FK
    timestamp created_at
  }
  direct_messages {
    uuid id PK
    uuid member_id FK
    uuid conversation_id FK
    text content
    text file_url
    boolean deleted
    timestamp created_at
    timestamp updated_at
  }
  users ||--|| profiles : "has one"
  profiles ||--o{ servers : "creates"
  profiles ||--o{ members : "has"
  profiles ||--o{ channels : "creates"
  servers ||--o{ members : "has"
  servers ||--o{ channels : "has"
  members ||--o{ messages : "sends"
  channels ||--o{ messages : "contains"
  members ||--o{ conversations : "initiates"
  members ||--o{ conversations : "receives"
  members ||--o{ direct_messages : "sends"
  conversations ||--o{ direct_messages : "contains"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
